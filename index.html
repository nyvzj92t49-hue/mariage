<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mariage Mélanie et Romain</title>

<link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="Mariage RM">
<meta name="theme-color" content="#FBF8F5">

</head>

<body>

<img src="haut-gauche.png" class="coin coin-gauche" alt="">
<img src="haut-droite.png" class="coin coin-droite" alt="">

<div class="conteneur">

    <img src="logo.png" class="logo" alt="">

    <div class="connexion">

        <h1>Bienvenue</h1>

        <p class="texte">
            Entrez le code pour accéder à l'espace photos du mariage.
        </p>

        <input type="text" id="code" placeholder="Code d'accès">

        <button type="button" onclick="verifierCode()">
            Entrer
        </button>

        <p id="erreur"></p>

    </div>

</div>

<img src="bouquet.png" class="bouquet" alt="">

<script>

function verifierCode() {
    const code = document.getElementById("code").value.trim();
    const erreur = document.getElementById("erreur");

    if (code === "140827") {
        sessionStorage.setItem("accesMariage", "ok");
        window.location.href = "partager.html";
    } else {
        erreur.textContent = "Code incorrect.";
    }
}

document.getElementById("code").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        verifierCode();
    }
});

</script>

</body>
</html>
