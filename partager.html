<body>

<div class="conteneur">

```
<img src="logo.png" class="logo" alt="">

<h1>Partager vos photos</h1>

<p class="texte">
    Sélectionnez vos photos ou vidéos du mariage puis envoyez-les.
</p>

<div class="upload-box">

    <label for="photos" class="upload-btn">
        Choisir mes photos
    </label>

    <input
        type="file"
        id="photos"
        multiple
        accept="image/*,video/*"
    >

</div>

<p id="message"></p>

<a href="galerie.html" class="bouton-retour">
    ← Retour
</a>
```

</div>

<img src="bouquet.png" class="bouquet" alt="">

<script>

const input = document.getElementById("photos");
const message = document.getElementById("message");

input.addEventListener("change", async () => {

    const fichiers = input.files;

    if (!fichiers.length) return;

    message.textContent = "Envoi en cours...";

    try {

        for (const fichier of fichiers) {

            const data = new FormData();

            data.append("file", fichier);
            data.append("upload_preset", "ml_default");

            const response = await fetch(
                "https://api.cloudinary.com/v1_1/duyhfyqjt/auto/upload",
                {
                    method: "POST",
                    body: data
                }
            );

            if (!response.ok) {
                throw new Error("Erreur Cloudinary");
            }
        }

        message.textContent =
        "Merci ❤️ Vos souvenirs ont bien été ajoutés à la galerie.";

        input.value = "";

    } catch (error) {

        console.error(error);

        message.textContent =
        "Une erreur est survenue pendant l'envoi. Merci de réessayer.";
    }

});

</script>

</body>
