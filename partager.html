<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partager mes photos</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="haut-gauche.png" class="coin coin-gauche" alt="">
    <img src="haut-droite.png" class="coin coin-droite" alt="">

    <div class="conteneur">

        <img src="logo.png" class="logo" alt="Logo">

        <p class="texte">
            Merci de partager avec nous vos plus beaux souvenirs de cette journée.
        </p>

        <input
            type="file"
            id="photos"
            multiple
            accept="image/*"
        >

        <button>
            Envoyer les photos
        </button>

        <br><br>

        <a href="galerie.html" class="retour">
            Retour
        </a>

    </div>

    <img src="bouquet.png" class="bouquet" alt="">

</body>
</html>
