<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album du mariage</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<img src="haut-gauche.png" class="coin coin-gauche" alt="">
<img src="haut-droite.png" class="coin coin-droite" alt="">

<div class="conteneur album-conteneur">

    <img src="logo.png" class="logo" alt="">

    <h1>Album du mariage</h1>

    <p class="texte">
        Retrouvez ici les souvenirs partagés par les invités.
    </p>

    <div id="album" class="album-grid">
        <p class="texte">Chargement de l'album...</p>
    </div>

    <a href="partager.html" class="bouton-retour">
        Retour
    </a>

</div>

<div id="visionneuse" class="visionneuse">
    <button class="fermer-visionneuse" onclick="fermerVisionneuse()">×</button>

    <button class="nav-visionneuse precedent" onclick="photoPrecedente()">‹</button>

    <img id="imageGrande" src="" alt="">

    <button class="nav-visionneuse suivant" onclick="photoSuivante()">›</button>
</div>

<script>

const cloudName = "duyhfyqjt";
const tag = "mariage";
const album = document.getElementById("album");
const visionneuse = document.getElementById("visionneuse");
const imageGrande = document.getElementById("imageGrande");

let medias = [];
let indexActuel = 0;

fetch(`https://res.cloudinary.com/${cloudName}/any/list/${tag}.json`)
    .then(response => {
        if (!response.ok) {
            throw new Error("Album indisponible");
        }

        return response.json();
    })
    .then(data => {
        album.innerHTML = "";

        if (!data.resources || data.resources.length === 0) {
            album.innerHTML = "<p class='texte'>Aucune photo pour le moment.</p>";
            return;
        }

        medias = data.resources.filter(media => media.resource_type === "image");

        medias.forEach((media, index) => {
            const publicId = media.public_id;

            const img = document.createElement("img");

            img.src =
            `https://res.cloudinary.com/${cloudName}/image/upload/c_fill,w_500,h_500,q_auto,f_auto/${publicId}`;

            img.alt = "";
            img.onclick = () => ouvrirVisionneuse(index);

            album.appendChild(img);
        });
    })
    .catch(error => {
        console.error(error);

        album.innerHTML =
        "<p class='texte'>Impossible de charger l'album pour le moment.</p>";
    });

function ouvrirVisionneuse(index) {
    indexActuel = index;
    afficherImage();
    visionneuse.classList.add("active");
}

function fermerVisionneuse() {
    visionneuse.classList.remove("active");
}

function afficherImage() {
    const media = medias[indexActuel];

    imageGrande.src =
    `https://res.cloudinary.com/${cloudName}/image/upload/q_auto,f_auto/${media.public_id}`;
}

function photoPrecedente() {
    indexActuel--;

    if (indexActuel < 0) {
        indexActuel = medias.length - 1;
    }

    afficherImage();
}

function photoSuivante() {
    indexActuel++;

    if (indexActuel >= medias.length) {
        indexActuel = 0;
    }

    afficherImage();
}

document.addEventListener("keydown", event => {
    if (!visionneuse.classList.contains("active")) return;

    if (event.key === "Escape") {
        fermerVisionneuse();
    }

    if (event.key === "ArrowLeft") {
        photoPrecedente();
    }

    if (event.key === "ArrowRight") {
        photoSuivante();
    }
});

</script>

</body>
</html>
