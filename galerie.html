<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album du mariage</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<img src="haut-gauche.png" class="coin coin-gauche" alt="">
<img src="haut-droite.png" class="coin coin-droite" alt="">

<div class="conteneur album-conteneur">

    <img src="logo.png" class="logo" alt="">

    <h1>Album du mariage</h1>

    <p class="texte">
        Retrouvez ici les souvenirs partagés par les invités.
    </p>

    <div id="album" class="album-grid">
        <p class="texte">Chargement de l'album...</p>
    </div>

    <a href="partager.html" class="bouton-retour">
        Retour
    </a>

</div>

<img src="bouquet.png" class="bouquet" alt="">

<script>

const cloudName = "duyhfyqjt";
const tag = "mariage";
const album = document.getElementById("album");

fetch(`https://res.cloudinary.com/${cloudName}/any/list/${tag}.json`)
    .then(response => {
        if (!response.ok) {
            throw new Error("Album indisponible");
        }

        return response.json();
    })
    .then(data => {
        album.innerHTML = "";

        if (!data.resources || data.resources.length === 0) {
            album.innerHTML = "<p class='texte'>Aucune photo pour le moment.</p>";
            return;
        }

        data.resources.forEach(media => {
            const publicId = media.public_id;
            const format = media.format;
            const type = media.resource_type;

            if (type === "image") {
                const img = document.createElement("img");

                img.src =
                `https://res.cloudinary.com/${cloudName}/image/upload/c_fill,w_500,h_500,q_auto,f_auto/${publicId}`;

                img.alt = "";

                album.appendChild(img);
            }

            if (type === "video") {
                const video = document.createElement("video");

                video.src =
                `https://res.cloudinary.com/${cloudName}/video/upload/${publicId}.${format}`;

                video.controls = true;

                album.appendChild(video);
            }
        });
    })
    .catch(error => {
        console.error(error);

        album.innerHTML =
        "<p class='texte'>Impossible de charger l'album pour le moment.</p>";
    });

</script>

</body>
</html>
